name: Docs
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Build solution (optional for docs)
        run: dotnet build -c Release BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Show tree (quick sanity)
        run: |
          ls -la
          ls -la BacklashBot
          ls -la docfx_project

      - name: Generate API metadata
        run: docfx metadata docfx_project/docfx.json --logLevel Verbose

      - name: Check metadata output
        run: |
          ls -R docfx_project/obj || true
          test -f docfx_project/obj/api/index.yaml || true

      - name: Build site
        run: docfx build docfx_project/docfx.json --logLevel Verbose

      - name: Commit Updated Documentation
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "docs" ]; then
            git add docs/
            if [ -n "$(git status --porcelain docs/)" ]; then
              git commit -m "Update documentation"
              git push
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish artifact (optional)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs