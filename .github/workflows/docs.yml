name: Docs
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Build solution (optional for docs)
        run: dotnet build -c Release BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Clean previous outputs
        run: |
          rm -rf docfx_project/api
          rm -rf docfx_project/obj
          rm -rf docs

      - name: Show tree (quick sanity)
        run: |
          ls -la
          ls -la BacklashBot
          ls -la docfx_project

      - name: Generate API metadata
        run: docfx metadata docfx_project/docfx.json --logLevel Verbose

      - name: Check metadata output
        run: |
          ls -R docfx_project/obj || true
          test -f docfx_project/obj/api/index.yaml || true

      - name: Generate API toc.yml (by namespace)
        run: |
          set -e
          mkdir -p docfx_project/api
          # collect top-level namespace YAMLs emitted by docfx metadata
          ns_files=$(find docfx_project/api -path "*/namespace/*.yml" -type f | sort)
          # flat TOC (every namespace as an entry)
          {
            echo "items:"
            # first 'uid:' in each namespace file is the namespace uid
            while IFS= read -r f; do
              uid=$(awk '/^uid: /{print $2; exit}' "$f")
              [ -n "$uid" ] && echo "  - uid: $uid"
            done <<< "$ns_files"
          } > docfx_project/api/toc.yml

          # minimal landing page so /api/index.html exists
          printf "# API Reference\n\nBrowse namespaces and types.\n" > docfx_project/api/index.md

          echo "Generated toc.yml:"
          cat docfx_project/api/toc.yml

      - name: Build site
        run: docfx build docfx_project/docfx.json --logLevel Verbose

      - name: Sanity check API pages
        run: |
          echo "Count of API html pages under docs/api:"
          find docs/api -type f -name "*.html" | wc -l
          find docs/api -maxdepth 2 -name "index.html" -print | head

      - name: Commit Updated Documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "docs" ]; then
            echo '!docs/**' >> .gitignore
            git add docs .gitignore
            git commit -m "Update DocFX site" || echo "No changes"
            git push origin HEAD:main
          fi

      - name: Publish artifact (optional)
        if: hashFiles('docs/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs