name: Update Documentation

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore Dependencies
        run: cd BacklashBot && dotnet restore BacklashBot.sln

      - name: Build Project
        run: cd BacklashBot && dotnet build BacklashBot.sln /p:EnableWindowsTargeting=true
        env:
          DOTNET_CLI_ENABLE_WINDOWS_TARGETING: true

      - name: List Build Output
        run: find . -name "*.dll" -o -name "*.exe" | head -20

      - name: Check Specific Assemblies
        run: |
          ls -la KalshiBotAPI/bin/Debug/net8.0/ || echo "KalshiBotAPI bin not found"
          ls -la BacklashBot/bin/Debug/net8.0/ || echo "BacklashBot bin not found"
          ls -la KalshiBotOverseer/bin/Debug/net8.0/ || echo "KalshiBotOverseer bin not found"

      - name: Generate Documentation
        run: docfx build docfx_project/docfx.json --verbose

      - name: Commit Updated Documentation
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "docs" ]; then
            git add docs/
            if [ -n "$(git status --porcelain docs/)" ]; then
              git commit -m "Update documentation"
              git push
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}