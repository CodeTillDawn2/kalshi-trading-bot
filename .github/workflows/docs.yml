name: Docs
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore solution
        run: dotnet restore BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Build solution (optional for docs)
        run: dotnet build -c Release BacklashBot/BacklashBot.sln /p:EnableWindowsTargeting=true

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Clean previous site
        run: |
          rm -rf docs
          rm -rf docfx_project/obj

      - name: Show tree (quick sanity)
        run: |
          ls -la
          ls -la BacklashBot
          ls -la docfx_project

      - name: Generate API metadata
        run: docfx metadata docfx_project/docfx.json --logLevel Verbose

      - name: Check metadata output
        run: |
          ls -R docfx_project/obj || true
          test -f docfx_project/obj/api/index.yaml || true

      - name: Generate API TOC from metadata
        run: |
          mkdir -p docfx_project/api
          {
            echo "items:"
            find docfx_project/obj/api -path "*/namespace/*.yml" -type f -print0 \
              | xargs -0 -I{} awk '/^uid: /{print "  - uid: "$2; exit }' "{}" \
              | sort -u
          } > docfx_project/api/toc.yml
          printf "# API landing\n# (Optional extra content)\n\n# API Reference\n" > docfx_project/api/index.md
          cat docfx_project/api/toc.yml

      - name: Build site
        run: docfx build docfx_project/docfx.json --logLevel Verbose

      - name: Sanity check API pages
        run: |
          echo "Count of API html pages under docs/api:"
          find docs/api -type f -name "*.html" | wc -l
          find docs/api -maxdepth 2 -name "index.html" -print | head

      - name: Commit Updated Documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "docs" ]; then
            echo '!docs/**' >> .gitignore
            git add docs .gitignore
            git commit -m "Update DocFX site" || echo "No changes"
            git push origin HEAD:main
          fi

      - name: Publish artifact (optional)
        if: hashFiles('docs/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs