<!DOCTYPE html>
<html>
<head>
    <style>
        .data-grid {
            width: 100%;
            border-collapse: collapse;
            background: rgba(28, 51, 39, 0.2);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(28, 51, 39, 0.5);
        }

        .data-grid th,
        .data-grid td {
            padding: 12px 16px;
            text-align: left;
            color: rgb(225, 221, 206);
            font-size: 14px;
            border-bottom: 2px solid rgba(28, 51, 39, 0.4);
        }

        .data-grid th {
            background: rgba(28, 51, 39, 0.9);
            font-weight: 700;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="control-card">
        <div class="control-title">System Metrics</div>
        <div class="control-description">Resource usage summary</div>
        <table class="data-grid">
            <thead>
                <tr>
                    <th>Resource</th>
                    <th>Usage</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="color: rgb(225, 221, 206); font-weight: 600;">CPU</td>
                    <td style="color: rgb(225, 221, 206);">45%</td>
                    <td style="color: #28a745; font-weight: 600;">Normal</td>
                </tr>
                <tr>
                    <td style="color: rgb(225, 221, 206); font-weight: 600;">Memory</td>
                    <td style="color: rgb(225, 221, 206);">2.1 GB</td>
                    <td style="color: #ffc107; font-weight: 600;">Warning</td>
                </tr>
                <tr>
                    <td style="color: rgb(225, 221, 206); font-weight: 600;">Disk</td>
                    <td style="color: rgb(225, 221, 206);">78%</td>
                    <td style="color: #dc3545; font-weight: 600;">High</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function updateDataGrid() {
            const rows = document.querySelectorAll('.data-grid tbody tr');

            rows.forEach((row, index) => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 3) {
                    if (index === 0) { // CPU
                        const cpuValue = Math.floor(Math.random() * 100) + '%';
                        cells[1].textContent = cpuValue;

                        if (parseInt(cpuValue) < 70) {
                            cells[2].textContent = 'Normal';
                            cells[2].style.color = '#28a745';
                        } else if (parseInt(cpuValue) < 90) {
                            cells[2].textContent = 'Warning';
                            cells[2].style.color = '#ffc107';
                        } else {
                            cells[2].textContent = 'High';
                            cells[2].style.color = '#dc3545';
                        }
                    } else if (index === 1) { // Memory
                        const gb = (Math.random() * 4 + 1).toFixed(1);
                        const memValue = gb + ' GB';
                        cells[1].textContent = memValue;

                        if (parseFloat(gb) < 2.5) {
                            cells[2].textContent = 'Normal';
                            cells[2].style.color = '#28a745';
                        } else if (parseFloat(gb) < 3.5) {
                            cells[2].textContent = 'Warning';
                            cells[2].style.color = '#ffc107';
                        } else {
                            cells[2].textContent = 'High';
                            cells[2].style.color = '#dc3545';
                        }
                    } else if (index === 2) { // Disk
                        const diskValue = Math.floor(Math.random() * 100) + '%';
                        cells[1].textContent = diskValue;

                        if (parseInt(diskValue) < 70) {
                            cells[2].textContent = 'Normal';
                            cells[2].style.color = '#28a745';
                        } else if (parseInt(diskValue) < 90) {
                            cells[2].textContent = 'Warning';
                            cells[2].style.color = '#ffc107';
                        } else {
                            cells[2].textContent = 'High';
                            cells[2].style.color = '#dc3545';
                        }
                    }
                }
            });
        }

        // Auto-update every 5.5 seconds
        setInterval(updateDataGrid, 5500);
        updateDataGrid(); // Initial update
    </script>
</body>
</html>
