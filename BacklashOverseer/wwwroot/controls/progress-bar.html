<!DOCTYPE html>
<html>
<head>
    <style>
        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: rgba(28, 51, 39, 0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(28, 51, 39, 0.5);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-radius: 13px;
            transition: width 1s ease-in-out;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
        }

        .progress-value {
            color: rgb(225, 221, 206);
            font-size: 16px;
            font-weight: bold;
            margin-top: 12px;
            text-shadow: 0 0 5px rgba(225, 221, 206, 0.3);
        }
    </style>
</head>
<body>
    <div class="control-card">
        <div class="control-title">Memory Usage</div>
        <div class="control-description">Linear progress for memory consumption</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" style="width: 65%"></div>
        </div>
        <div class="progress-value">65%</div>
    </div>

    <script>
        function updateProgressBar() {
            const percentage = Math.floor(Math.random() * 100);
            const progressFill = document.querySelector('.progress-bar-fill');
            const progressValue = document.querySelector('.progress-value');

            if (progressFill) {
                progressFill.style.transition = 'width 1s ease-in-out';
                progressFill.style.width = percentage + '%';
            }
            if (progressValue) {
                progressValue.textContent = percentage + '%';
            }
        }

        // Auto-update every 3 seconds
        setInterval(updateProgressBar, 3000);
        updateProgressBar(); // Initial update
    </script>
</body>
</html>
