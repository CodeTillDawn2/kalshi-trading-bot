<!DOCTYPE html>
<html>
<head>
    <style>
        .speed-dial {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .speed-dial-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #28a745 0% 60%,
                #ffc107 60% 80%,
                #dc3545 80% 100%
            );
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 3px solid rgba(28, 51, 39, 0.8);
        }

        .speed-dial-indicator {
            position: absolute;
            width: 6px;
            height: 25px;
            background: rgb(225, 221, 206);
            border-radius: 3px;
            top: 50%;
            left: 50%;
            transform-origin: 50% 62px;
            box-shadow: 0 0 10px rgba(225, 221, 206, 1);
        }

        .speed-dial-center {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(16, 16, 13, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(225, 221, 206);
            font-size: 20px;
            font-weight: bold;
            border: 2px solid rgba(28, 51, 39, 0.6);
        }
    </style>
</head>
<body>
    <div class="control-card">
        <div class="control-title">CPU Usage</div>
        <div class="control-description">Circular gauge for CPU utilization</div>
        <div class="speed-dial">
            <div class="speed-dial-circle">
                <div class="speed-dial-center"></div>
                <div class="speed-dial-indicator"></div>
            </div>
        </div>
        <div class="control-overlay" style="font-size: 32px; opacity: 0.9; top: 65%;">75%</div>
    </div>

    <script>
        function updateSpeedDial() {
            const percentage = Math.floor(Math.random() * 100);
            const overlay = document.querySelector('.control-overlay');
            const indicator = document.querySelector('.speed-dial-indicator');

            if (overlay) {
                overlay.textContent = percentage + '%';
            }

            if (indicator) {
                const angle = (percentage / 100) * 360 - 90;
                indicator.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
            }

            const dialCircle = document.querySelector('.speed-dial-circle');
            if (dialCircle) {
                let gradient;
                if (percentage < 50) {
                    gradient = `conic-gradient(#28a745 0% ${percentage}%, #ffc107 ${percentage}% 75%, #dc3545 75% 100%)`;
                } else if (percentage < 75) {
                    gradient = `conic-gradient(#28a745 0% 50%, #ffc107 50% ${percentage}%, #dc3545 ${percentage}% 100%)`;
                } else {
                    gradient = `conic-gradient(#28a745 0% 50%, #ffc107 50% 75%, #dc3545 75% ${percentage}%)`;
                }
                dialCircle.style.background = gradient;
            }
        }

        // Auto-update every 2 seconds
        setInterval(updateSpeedDial, 2000);
        updateSpeedDial(); // Initial update
    </script>
</body>
</html>
