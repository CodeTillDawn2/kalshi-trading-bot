<!DOCTYPE html>
<html>
<head>
    <style>
        .traffic-light {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .traffic-light-bulb {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid rgba(28, 51, 39, 0.7);
            transition: all 0.5s ease;
        }

        .traffic-light-bulb.active {
            box-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            transform: scale(1.1);
        }

        .traffic-light-bulb.red { background: #dc3545; color: #dc3545; }
        .traffic-light-bulb.yellow { background: #ffc107; color: #ffc107; }
        .traffic-light-bulb.green { background: #28a745; color: #28a745; }
    </style>
</head>
<body>
    <div class="control-card">
        <div class="control-title">Brain Status</div>
        <div class="control-description">Overall health indicator</div>
        <div class="traffic-light">
            <div class="traffic-light-bulb red"></div>
            <div class="traffic-light-bulb yellow"></div>
            <div class="traffic-light-bulb green active"></div>
        </div>
    </div>

    <script>
        function updateTrafficLight() {
            const bulbs = document.querySelectorAll('.traffic-light-bulb');

            bulbs.forEach(bulb => bulb.classList.remove('active'));

            const randomIndex = Math.floor(Math.random() * bulbs.length);
            bulbs[randomIndex].classList.add('active');
        }

        // Auto-update every 5 seconds
        setInterval(updateTrafficLight, 5000);
        updateTrafficLight(); // Initial update
    </script>
</body>
</html>
