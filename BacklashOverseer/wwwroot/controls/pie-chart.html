<!DOCTYPE html>
<html>
<head>
    <style>
        .pie-chart-container {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #28a745 0% 40%,
                #20c997 40% 70%,
                #17a2b8 70% 100%
            );
            border: 3px solid rgba(28, 51, 39, 0.6);
        }

        .pie-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(16, 16, 13, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(225, 221, 206);
            font-size: 16px;
            font-weight: bold;
            border: 2px solid rgba(28, 51, 39, 0.5);
        }

        .pie-legend {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="control-card">
        <div class="control-title">Resource Allocation</div>
        <div class="control-description">Distribution of system resources</div>
        <div class="pie-chart-container">
            <div class="pie-chart"></div>
            <div class="pie-center"></div>
        </div>
        <div class="pie-legend">
            <div style="display: flex; align-items: center; gap: 5px;">
                <div style="width: 12px; height: 12px; background: #28a745; border-radius: 3px;"></div>
                <span style="color: rgb(225, 221, 206); opacity: 0.9; font-weight: 500;">CPU</span>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div style="width: 12px; height: 12px; background: #20c997; border-radius: 3px;"></div>
                <span style="color: rgb(225, 221, 206); opacity: 0.9; font-weight: 500;">Mem</span>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div style="width: 12px; height: 12px; background: #17a2b8; border-radius: 3px;"></div>
                <span style="color: rgb(225, 221, 206); opacity: 0.9; font-weight: 500;">Disk</span>
            </div>
        </div>
    </div>

    <script>
        function updatePieChart() {
            const percentage1 = Math.floor(Math.random() * 40) + 20; // 20-60%
            const percentage2 = Math.floor(Math.random() * 30) + 20; // 20-50%
            const percentage3 = 100 - percentage1 - percentage2; // Remainder

            const pieChart = document.querySelector('.pie-chart');
            const pieCenter = document.querySelector('.pie-center');

            if (pieChart) {
                const gradient = `conic-gradient(
                    #28a745 0% ${percentage1}%,
                    #20c997 ${percentage1}% ${percentage1 + percentage2}%,
                    #17a2b8 ${percentage1 + percentage2}% 100%
                )`;
                pieChart.style.background = gradient;
            }

            if (pieCenter) {
                pieCenter.textContent = `CPU\n${percentage1}%`;
            }
        }

        // Auto-update every 3.5 seconds
        setInterval(updatePieChart, 3500);
        updatePieChart(); // Initial update
    </script>
</body>
</html>
